    <title>NexaDesk — Conversations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
            colors: {
              brand: {
                50: "#f0f4ff",
                100: "#e0e9ff",
                200: "#c7d6fe",
                300: "#a5b8fd",
                400: "#818cf8",
                500: "#6366f1",
                600: "#4f46e5",
                700: "#4338ca",
                800: "#3730a3",
                900: "#312e81",
              },
            },
            animation: {
              "fade-in": "fadeIn 0.4s ease-out",
              "slide-up": "slideUp 0.35s ease-out",
              "pop-in": "popIn 0.25s ease-out",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              slideUp: {
                "0%": { opacity: "0", transform: "translateY(12px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              popIn: {
                "0%": { opacity: "0", transform: "scale(.96) translateY(6px)" },
                "100%": { opacity: "1", transform: "scale(1) translateY(0)" },
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="js/app.js"></script>
    <style>
      body {
        font-family: "Inter", system-ui, sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar-link {
        transition: all 0.18s ease;
        position: relative;
      }
      .sidebar-link:hover {
        background: rgba(99, 102, 241, 0.06);
      }
      .sidebar-link.active {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.1),
          rgba(139, 92, 246, 0.08)
        );
        color: #4338ca;
      }
      .sidebar-link.active .nav-icon {
        color: #4f46e5;
      }
      .sidebar-link.active::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 3px;
        background: linear-gradient(180deg, #6366f1, #8b5cf6);
        border-radius: 0 4px 4px 0;
      }

      #mobile-overlay {
        transition: opacity 0.25s ease;
      }
      #sidebar {
        transition: transform 0.25s ease;
      }
      @media (max-width: 1023px) {
        #sidebar {
          transform: translateX(-100%);
        }
        #sidebar.open {
          transform: translateX(0);
        }
      }

      /* Conversation list item */
      .conv-item {
        transition: background 0.15s ease;
        cursor: pointer;
      }
      .conv-item:hover {
        background: #f8fafc;
      }
      .conv-item.active {
        background: linear-gradient(
          135deg,
          rgba(99, 102, 241, 0.07),
          rgba(139, 92, 246, 0.05)
        );
      }
      .conv-item.active .conv-name {
        color: #4338ca;
      }

      /* Chat bubbles */
      .bubble-in {
        background: #f1f5f9;
        border-radius: 4px 16px 16px 16px;
      }
      .bubble-out {
        background: linear-gradient(135deg, #6366f1, #7c3aed);
        border-radius: 16px 4px 16px 16px;
      }
      .bubble-ai {
        background: #fff;
        border: 1px solid #e9e5ff;
        border-radius: 4px 16px 16px 16px;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #94a3b8;
        animation: typingBounce 1.2s infinite ease-in-out;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes typingBounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
          opacity: 0.5;
        }
        30% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      .pulse-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
      }

      .channel-badge {
        width: 16px;
        height: 16px;
      }

      .chat-input:focus {
        outline: none;
        border-color: #a5b8fd;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
      }

      .scrollfade {
        -webkit-mask-image: linear-gradient(
          to bottom,
          transparent 0,
          black 16px,
          black 100%
        );
      }

      @media (max-width: 1023px) {
        .conv-panel {
          display: none;
        }
        .conv-panel.show {
          display: flex;
        }
        .list-panel.hide {
          display: none;
        }
      }
    </style>
  </head>

              </form>
            </div>

        </div>
      </div>
    </div>

    <script>
      // ════════════════════════════════════════════════════════

        {

          messages: [

      let activeConvId = 1;

      // ════════════════════════════════════════════════════════
      // RENDU LISTE
      // ════════════════════════════════════════════════════════
      const channelIcons = {
        whatsapp: `<svg class="channel-badge text-emerald-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-1.746-.873-2.888-1.56-4.035-3.54-.305-.524.305-.487.873-1.62.097-.198.05-.371-.05-.52-.099-.149-.67-1.612-.916-2.207-.247-.594-.495-.514-.67-.524-.173-.01-.372-.012-.571-.012-.198 0-.52.075-.792.372-.273.297-1.04 1.016-1.04 2.479s1.064 2.876 1.213 3.074c.149.198 2.057 3.13 4.987 4.27 2.93 1.14 2.93.76 3.882.654.95-.108 1.81-.99 2.082-1.94.273-.95.273-1.764.149-1.94-.124-.173-.297-.198-.57-.347z"/></svg>`,
        web: `<svg class="channel-badge text-indigo-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>`,
        messenger: `<svg class="channel-badge text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M9.198 21.5h4.604c.566 0 1.069-.359 1.255-.896l1.964-5.591a.5.5 0 01.471-.334H21a.5.5 0 00.498-.553L20.5 3.5a.5.5 0 00-.498-.447H4a.5.5 0 00-.498.553l1 9.5a.5.5 0 00.498.447h2.508a.5.5 0 01.471.334l1.964 5.591c.186.537.689.896 1.255.896z"/></svg>`,
      };

      const statusConfig = {
        ai: { label: "IA en cours", classes: "text-violet-600 bg-violet-50" },
        human: { label: "Agent requis", classes: "text-rose-600 bg-rose-50" },
        resolved: {
          label: "Résolue",
          classes: "text-emerald-600 bg-emerald-50",
        },
      };

      function renderList(filter = "all") {
        const list = document.getElementById("conv-list");
        let filtered = conversations;
        if (filter === "unread")
          filtered = conversations.filter((c) => c.unread > 0);
        if (filter === "ai")
          filtered = conversations.filter((c) => c.status === "ai");
        if (filter === "human")
          filtered = conversations.filter((c) => c.status === "human");

        if (filtered.length === 0) {
          list.innerHTML = `
          <div class="flex flex-col items-center justify-center h-64 px-6 text-center">
            <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3">
              <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
            <p class="text-sm font-medium text-slate-500">Aucune conversation trouvée</p>
            <p class="text-xs text-slate-400 mt-1">Essayez un autre filtre</p>
          </div>`;
          return;
        }

        list.innerHTML = filtered
          .map(
            (c) => `
        <div class="conv-item flex items-start gap-3 px-4 py-3.5 border-b border-slate-50 ${c.id === activeConvId ? "active" : ""}" onclick="openConversation(${c.id})">
          <div class="relative flex-shrink-0">
            <img src="${c.avatar}" class="w-11 h-11 rounded-full" alt="" />
            <span class="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5">${channelIcons[c.channel]}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center justify-between gap-2">
              <p class="conv-name text-sm font-semibold text-slate-700 truncate">${c.name}</p>
              <span class="text-[11px] text-slate-400 flex-shrink-0">${c.time}</span>
            </div>
            <p class="text-xs text-slate-400 truncate mt-0.5">${c.business}</p>
            <div class="flex items-center justify-between gap-2 mt-1.5">
              <p class="text-xs text-slate-500 truncate flex-1">${c.lastMsg}</p>

            </div>
            <span class="inline-flex mt-2 text-[11px] font-semibold px-2 py-0.5 rounded-full ${statusConfig[c.status].classes}">${statusConfig[c.status].label}</span>

      // ════════════════════════════════════════════════════════
      // RENDU CHAT
      // ════════════════════════════════════════════════════════
      function renderMessages(conv) {
        const box = document.getElementById("messages");
        box.innerHTML = conv.messages
          .map((m) => {
            if (m.from === "client") {
              return `
            <div class="flex items-end gap-2.5 max-w-[85%] sm:max-w-[70%] animate-pop-in">
              <img src="${conv.avatar}" class="w-7 h-7 rounded-full flex-shrink-0" alt="" />
              <div>
                <div class="bubble-in px-4 py-2.5 text-sm text-slate-700">${m.text}</div>
                <p class="text-[11px] text-slate-400 mt-1 ml-1">${m.time}</p>
              </div>
            </div>`;
            }
            if (m.from === "ai") {
              return `
            <div class="flex items-end gap-2.5 max-w-[85%] sm:max-w-[70%] ml-auto flex-row-reverse animate-pop-in">
              <span class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center flex-shrink-0">
                <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" stroke-width="2.4" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
              </span>
              <div class="text-right">
                <div class="bubble-ai px-4 py-2.5 text-sm text-slate-700 text-left">${m.text}</div>
                <p class="text-[11px] text-slate-400 mt-1 mr-1">Assistant IA · ${m.time}</p>
              </div>
            </div>`;
            }
            // agent humain
            return `
          <div class="flex items-end gap-2.5 max-w-[85%] sm:max-w-[70%] ml-auto flex-row-reverse animate-pop-in">
            <img src="https://i.pravatar.cc/30?img=12" class="w-7 h-7 rounded-full flex-shrink-0" alt="" />
            <div class="text-right">
              <div class="bubble-out px-4 py-2.5 text-sm text-white text-left">${m.text}</div>
              <p class="text-[11px] text-slate-400 mt-1 mr-1">Vous · ${m.time}</p>
            </div>
          </div>`;
          })
          .join("");
        box.scrollTop = box.scrollHeight;
      }

      function openConversation(id) {
        activeConvId = id;
        const conv = conversations.find((c) => c.id === id);
        conv.unread = 0;

        document.getElementById("chat-avatar").src = conv.avatar;
        document.getElementById("chat-name").textContent = conv.name;
        document.getElementById("chat-meta").innerHTML =
          `${channelIcons[conv.channel]} ${conv.business}`;

        const badge = document.getElementById("chat-status-badge");
        badge.textContent = statusConfig[conv.status].label;
        badge.className = `hidden sm:inline-flex text-xs font-semibold px-2.5 py-1 rounded-full ${statusConfig[conv.status].classes}`;

        renderMessages(conv);
        renderList(getCurrentFilter());

        // Mobile : afficher le panneau chat
        document.getElementById("list-panel").classList.add("hide");
        document.getElementById("conv-panel").classList.add("show");
      }

      function backToList() {
        document.getElementById("list-panel").classList.remove("hide");
        document.getElementById("conv-panel").classList.remove("show");
      }

      // ════════════════════════════════════════════════════════
      // FILTRES
      // ════════════════════════════════════════════════════════
      function getCurrentFilter() {
        const active = document.querySelector(".filter-tab.active");
        return active ? active.dataset.filter : "all";
      }

      document.getElementById("filter-tabs").addEventListener("click", (e) => {
        const btn = e.target.closest(".filter-tab");
        if (!btn) return;
        document.querySelectorAll(".filter-tab").forEach((b) => {
          b.classList.remove("active", "bg-indigo-600", "text-white");
          b.classList.add("bg-slate-100", "text-slate-600");
        });
        btn.classList.add("active", "bg-indigo-600", "text-white");
        btn.classList.remove("bg-slate-100", "text-slate-600");
        renderList(btn.dataset.filter);
      });

      // ════════════════════════════════════════════════════════
      // ENVOI DE MESSAGE (simulation)
      // ════════════════════════════════════════════════════════
      function sendMessage(e) {
        e.preventDefault();
        const input = document.getElementById("chat-input");
        const text = input.value.trim();
        if (!text) return;

        const conv = conversations.find((c) => c.id === activeConvId);
        conv.messages.push({ from: "human", text, time: nowTime() });
        conv.lastMsg = text;
        conv.time = nowTime();
        input.value = "";
        renderMessages(conv);
        renderList(getCurrentFilter());

        // Simule une réponse client après un délai (typing indicator)
        showTyping();
        setTimeout(() => {
          hideTyping();
          const replies = [
            "D'accord, merci pour votre réponse rapide !",
            "Ah super, je vous remercie 🙂",
            "Parfait, c'est noté de mon côté.",
          ];
          const reply = replies[Math.floor(Math.random() * replies.length)];
          conv.messages.push({ from: "client", text: reply, time: nowTime() });
          conv.lastMsg = reply;
          renderMessages(conv);
          renderList(getCurrentFilter());
        }, 1800);
      }

      function quickReply(text) {
        document.getElementById("chat-input").value = text;
        document.getElementById("chat-input").focus();
      }

      function showTyping() {
        const box = document.getElementById("messages");
        const typing = document.createElement("div");
        typing.id = "typing-indicator";
        typing.className = "flex items-end gap-2.5 max-w-[60%] animate-pop-in";
        typing.innerHTML = `
        <img src="${conversations.find((c) => c.id === activeConvId).avatar}" class="w-7 h-7 rounded-full flex-shrink-0" alt="" />
        <div class="bubble-in px-4 py-3 flex items-center gap-1.5">
          <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>`;
        box.appendChild(typing);
        box.scrollTop = box.scrollHeight;
      }

      function hideTyping() {
        const el = document.getElementById("typing-indicator");
        if (el) el.remove();
      }

      function takeOver() {
        const badge = document.getElementById("chat-status-badge");
        badge.textContent = "Pris en charge par vous";
        badge.className =
          "hidden sm:inline-flex text-xs font-semibold px-2.5 py-1 rounded-full text-blue-600 bg-blue-50";
        const conv = conversations.find((c) => c.id === activeConvId);
        conv.status = "human";
        renderList(getCurrentFilter());
      }

      function nowTime() {
        const d = new Date();
        return (
          d.getHours().toString().padStart(2, "0") +
          ":" +
          d.getMinutes().toString().padStart(2, "0")
        );
      }

      // ════════════════════════════════════════════════════════
      // SIDEBAR MOBILE
      // ════════════════════════════════════════════════════════
      // toggleSidebar() est définie dans js/app.js

      // ════════════════════════════════════════════════════════
      // INIT
      // ════════════════════════════════════════════════════════
      renderList();
      openConversation(1);
      // Sur desktop, le panneau liste reste visible par défaut (cf. CSS show/hide n'agit qu'en mobile)
      document.getElementById("list-panel").classList.remove("hide");
